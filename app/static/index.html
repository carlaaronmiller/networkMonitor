<html>
    <head>
        <title>Network + Telemetry Logger</title>
        <style>
            :root {
                color-scheme: light;
                --page:           #f9f9f7;
                --surface-1:      #fcfcfb;
                --text-primary:   #0b0b0b;
                --text-secondary: #52514e;
                --text-muted:     #898781;
                --gridline:       #e1e0d9;
                --baseline:       #c3c2b7;
                --series-1:       #2a78d6; /* blue */
                --series-2:       #008300; /* green */
                --series-3:       #e87ba4; /* magenta */
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    color-scheme: dark;
                    --page:           #0d0d0d;
                    --surface-1:      #1a1a19;
                    --text-primary:   #ffffff;
                    --text-secondary: #c3c2b7;
                    --text-muted:     #898781;
                    --gridline:       #2c2c2a;
                    --baseline:       #383835;
                    --series-1:       #3987e5;
                    --series-2:       #008300;
                    --series-3:       #d55181;
                }
            }
            * { box-sizing: border-box; }
            body {
                margin: 0;
                padding: 24px;
                background: var(--page);
                color: var(--text-primary);
                font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            }
            h1 { font-size: 20px; margin: 0 0 4px; }
            .subtitle { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
            .chart-card {
                background: var(--surface-1);
                border: 1px solid var(--gridline);
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 20px;
                max-width: 900px;
            }
            .chart-title { font-size: 14px; font-weight: 600; margin: 0 0 2px; }
            .chart-sub { font-size: 12px; color: var(--text-muted); margin: 0 0 10px; }
            .chart-wrap { position: relative; width: 100%; overflow-x: auto; }
            canvas { display: block; width: 100%; height: 220px; }
            .legend {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                margin-top: 8px;
                font-size: 12px;
                color: var(--text-secondary);
            }
            .legend-item { display: flex; align-items: center; gap: 6px; }
            .swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; }
            .tooltip {
                position: absolute;
                pointer-events: none;
                background: var(--surface-1);
                border: 1px solid var(--gridline);
                border-radius: 6px;
                padding: 6px 8px;
                font-size: 12px;
                color: var(--text-primary);
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                white-space: nowrap;
                display: none;
                z-index: 10;
            }
            .tooltip .row { display: flex; align-items: center; gap: 6px; }
            .status { font-size: 12px; color: var(--text-muted); margin-top: -12px; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <h1>Network + Telemetry Logger</h1>
        <p class="subtitle">Live view of the last two minutes of logged samples. Full history is in the on-vehicle SQLite database.</p>
        <p class="status" id="status">Loading...</p>

        <div class="chart-card">
            <p class="chart-title">Network throughput (download)</p>
            <p class="chart-sub">Bytes/sec received, per interface</p>
            <div class="chart-wrap">
                <canvas id="netChart"></canvas>
                <div class="tooltip" id="netTooltip"></div>
            </div>
            <div class="legend" id="netLegend"></div>
        </div>

        <div class="chart-card">
            <p class="chart-title">Orientation</p>
            <p class="chart-sub">Degrees, from vehicle telemetry</p>
            <div class="chart-wrap">
                <canvas id="orientChart"></canvas>
                <div class="tooltip" id="orientTooltip"></div>
            </div>
            <div class="legend" id="orientLegend"></div>
        </div>

        <script>
            const POLL_MS = 1000;
            const HISTORY_LIMIT = 120;

            function cssVar(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            }

            function formatBytesPerSec(v) {
                if (v == null) return "-";
                const abs = Math.abs(v);
                if (abs >= 1e6) return (v / 1e6).toFixed(1) + " MB/s";
                if (abs >= 1e3) return (v / 1e3).toFixed(1) + " KB/s";
                return v.toFixed(0) + " B/s";
            }

            function formatDegrees(v) {
                if (v == null) return "-";
                return v.toFixed(1) + "°";
            }

            function radToDeg(r) {
                return r == null ? null : r * 180 / Math.PI;
            }

            // A small reusable line-chart renderer: one axis, fixed-order categorical
            // series, hairline gridlines, 2px lines, hover crosshair + tooltip.
            function makeLineChart(canvas, tooltipEl, series, valueFormatter) {
                const ctx = canvas.getContext("2d");
                let samples = [];
                let plotArea = { x: 0, y: 0, w: 0, h: 0 };
                let yMin = 0, yMax = 1;

                function resize() {
                    const rect = canvas.getBoundingClientRect();
                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    draw();
                }
                window.addEventListener("resize", resize);

                function niceMax(v) {
                    if (v <= 0) return 1;
                    const pow = Math.pow(10, Math.floor(Math.log10(v)));
                    return Math.ceil(v / pow) * pow;
                }

                function draw() {
                    const rect = canvas.getBoundingClientRect();
                    const w = rect.width, h = rect.height;
                    ctx.clearRect(0, 0, w, h);

                    const padLeft = 46, padRight = 8, padTop = 8, padBottom = 20;
                    plotArea = { x: padLeft, y: padTop, w: w - padLeft - padRight, h: h - padTop - padBottom };

                    if (samples.length < 2) {
                        ctx.fillStyle = cssVar("--text-muted");
                        ctx.font = "12px system-ui, sans-serif";
                        ctx.fillText("Waiting for samples...", plotArea.x, plotArea.y + plotArea.h / 2);
                        return;
                    }

                    let allVals = [];
                    for (const s of series) {
                        for (const row of samples) {
                            const v = s.get(row);
                            if (v != null) allVals.push(v);
                        }
                    }
                    const rawMax = Math.max(0, ...allVals);
                    const rawMin = Math.min(0, ...allVals);
                    yMax = niceMax(rawMax) || 1;
                    yMin = rawMin < 0 ? -niceMax(-rawMin) : 0;

                    const tMin = samples[0].timestamp;
                    const tMax = samples[samples.length - 1].timestamp;
                    const tSpan = Math.max(tMax - tMin, 1);

                    function xFor(t) { return plotArea.x + ((t - tMin) / tSpan) * plotArea.w; }
                    function yFor(v) { return plotArea.y + (1 - (v - yMin) / (yMax - yMin)) * plotArea.h; }

                    // gridlines + y ticks
                    ctx.strokeStyle = cssVar("--gridline");
                    ctx.lineWidth = 1;
                    ctx.fillStyle = cssVar("--text-muted");
                    ctx.font = "11px system-ui, sans-serif";
                    const ticks = 4;
                    for (let i = 0; i <= ticks; i++) {
                        const v = yMin + (yMax - yMin) * (i / ticks);
                        const y = yFor(v);
                        ctx.beginPath();
                        ctx.moveTo(plotArea.x, y + 0.5);
                        ctx.lineTo(plotArea.x + plotArea.w, y + 0.5);
                        ctx.stroke();
                        ctx.fillText(valueFormatter(v), 2, y + 3);
                    }

                    // baseline (zero line), slightly stronger than gridlines
                    ctx.strokeStyle = cssVar("--baseline");
                    const zeroY = yFor(0);
                    ctx.beginPath();
                    ctx.moveTo(plotArea.x, zeroY + 0.5);
                    ctx.lineTo(plotArea.x + plotArea.w, zeroY + 0.5);
                    ctx.stroke();

                    // series lines
                    for (const s of series) {
                        ctx.strokeStyle = cssVar(s.colorVar);
                        ctx.lineWidth = 2;
                        ctx.lineJoin = "round";
                        ctx.lineCap = "round";
                        ctx.beginPath();
                        let started = false;
                        for (const row of samples) {
                            const v = s.get(row);
                            if (v == null) continue;
                            const x = xFor(row.timestamp), y = yFor(v);
                            if (!started) { ctx.moveTo(x, y); started = true; }
                            else ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                }

                canvas.addEventListener("mousemove", (evt) => {
                    if (samples.length < 2) return;
                    const rect = canvas.getBoundingClientRect();
                    const mx = evt.clientX - rect.left;
                    if (mx < plotArea.x || mx > plotArea.x + plotArea.w) {
                        tooltipEl.style.display = "none";
                        return;
                    }
                    const tMin = samples[0].timestamp;
                    const tMax = samples[samples.length - 1].timestamp;
                    const tSpan = Math.max(tMax - tMin, 1);
                    const t = tMin + ((mx - plotArea.x) / plotArea.w) * tSpan;
                    let nearest = samples[0];
                    for (const row of samples) {
                        if (Math.abs(row.timestamp - t) < Math.abs(nearest.timestamp - t)) nearest = row;
                    }
                    const time = new Date(nearest.timestamp * 1000).toLocaleTimeString();
                    let html = `<div><strong>${time}</strong></div>`;
                    for (const s of series) {
                        const v = s.get(nearest);
                        html += `<div class="row"><span class="swatch" style="background:${cssVar(s.colorVar)}"></span>${s.label}: ${valueFormatter(v)}</div>`;
                    }
                    tooltipEl.innerHTML = html;
                    tooltipEl.style.display = "block";
                    tooltipEl.style.left = Math.min(mx + 12, rect.width - 160) + "px";
                    tooltipEl.style.top = "8px";
                });
                canvas.addEventListener("mouseleave", () => { tooltipEl.style.display = "none"; });

                resize();

                return {
                    setData(newSamples) { samples = newSamples; draw(); },
                };
            }

            function buildLegend(el, series) {
                el.innerHTML = "";
                for (const s of series) {
                    const item = document.createElement("div");
                    item.className = "legend-item";
                    item.innerHTML = `<span class="swatch" style="background:${cssVar(s.colorVar)}"></span>${s.label}`;
                    el.appendChild(item);
                }
            }

            const netSeries = [
                { key: "eth0_bps_recv", label: "eth0 (antenna) rx", colorVar: "--series-1", get(row) { return row.eth0_bps_recv; } },
                { key: "wlan0_bps_recv", label: "wlan0 (Starlink) rx", colorVar: "--series-2", get(row) { return row.wlan0_bps_recv; } },
            ];
            const orientSeries = [
                { key: "roll", label: "roll", colorVar: "--series-1", get(row) { return radToDeg(row.roll); } },
                { key: "pitch", label: "pitch", colorVar: "--series-2", get(row) { return radToDeg(row.pitch); } },
                { key: "yaw", label: "yaw", colorVar: "--series-3", get(row) { return radToDeg(row.yaw); } },
            ];

            const netChart = makeLineChart(document.getElementById("netChart"), document.getElementById("netTooltip"), netSeries, formatBytesPerSec);
            const orientChart = makeLineChart(document.getElementById("orientChart"), document.getElementById("orientTooltip"), orientSeries, formatDegrees);
            buildLegend(document.getElementById("netLegend"), netSeries);
            buildLegend(document.getElementById("orientLegend"), orientSeries);

            async function poll() {
                try {
                    const res = await fetch(`/api/history?limit=${HISTORY_LIMIT}`);
                    const rows = await res.json();
                    netChart.setData(rows);
                    orientChart.setData(rows);
                    document.getElementById("status").textContent =
                        rows.length ? `${rows.length} samples, last at ${new Date(rows[rows.length - 1].timestamp * 1000).toLocaleTimeString()}` : "No samples logged yet.";
                } catch (e) {
                    document.getElementById("status").textContent = "Failed to reach /api/history - is the backend running?";
                }
            }

            poll();
            setInterval(poll, POLL_MS);
        </script>
    </body>
</html>
